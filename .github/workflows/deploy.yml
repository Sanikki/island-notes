name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# 允许 Actions 把构建产物发布到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # vite.config.ts 中 NODE_ENV=production 时 base 自动设为 /my_blog/
        run: npm run build

      - name: SPA 深链回退（复制 index.html 为 404.html）
        # GitHub Pages 不原生支持 SPA 路由，深链接刷新会 404；
        # 用 404.html 兜底，让前端 router(basename=/my_blog) 接管路由。
        run: cp dist/index.html dist/404.html

      - name: 关闭 Jekyll（避免下划线文件被忽略）
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
